name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install UV
        uses: astral-sh/setup-uv@v4
      - name: Build
        run: uv build
      - name: Verify no URL deps in wheel
        run: |
          set -euo pipefail
          unzip -p dist/*.whl '*METADATA' | grep '^Requires-Dist:' > /tmp/deps.txt
          if grep -E '@ (git|http|file)' /tmp/deps.txt; then
            echo "URL dependency found in wheel METADATA -- aborting"
            exit 1
          fi
          cat /tmp/deps.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi-release   # protected -- manual approval gate
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
