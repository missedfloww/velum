name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Need HEAD~1 for the STATUS.md drift backstop check (dev repo only).
          # Harmless in the public repo, where the drift step is skipped.
          fetch-depth: 2

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: STATUS.md drift backstop
        # Mirror of the local pre-commit hook (.githooks/pre-commit). Catches
        # any agent that bypassed the hook with --no-verify or forgot to
        # install hooks via 'git config core.hooksPath .githooks'.
        # Skipped automatically when the script isn't present (public repo).
        if: ${{ hashFiles('scripts/check_status_drift.py') != '' }}
        run: uv run python scripts/check_status_drift.py --on-head

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Run tests
        env:
          VELUM_CI: "1"
        run: uv run pytest tests/ -v --tb=short
